name: CI - SOLINVORD Laravel Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Laravel Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar PHP 8.4 con extensiones necesarias
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, xml, bcmath, ctype, json, tokenizer
          coverage: none

      # 3. Cachear dependencias de Composer
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # 4. Instalar dependencias de Composer
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # 5. Copiar y configurar el archivo .env para pruebas
      - name: Copy .env for testing
        run: cp .env.example .env

      # 6. Generar la clave de la aplicación
      - name: Generate application key
        run: php artisan key:generate

      # 7. Crear la base de datos SQLite en memoria (configurada en phpunit.xml)
      - name: Create SQLite database file
        run: touch database/database.sqlite

      # 8. Ejecutar migraciones en la base de datos de pruebas
      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      # 9. Ejecutar todas las pruebas con php artisan test
      - name: Run tests
        run: php artisan test --testdox
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
